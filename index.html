<!-- ══════════════════════════════════════════════════

<style>
#cm-fab {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  background: linear-gradient(135deg,#d4ff00,#00ff66);
  color: #000; border: none; border-radius: 50px;
  padding: 12px 20px; font-size: 15px; font-weight: 700;
  cursor: pointer; box-shadow: 0 4px 24px rgba(212,255,0,0.4);
  display: flex; align-items: center; gap: 8px;
  font-family: 'Inter', sans-serif;
  transition: transform .15s;
}
#cm-fab:active { transform: scale(.95); }
#cm-overlay {
  display: none; position: fixed; inset: 0; z-index: 9998;
  background: rgba(0,0,0,.6); backdrop-filter: blur(4px);
  justify-content: center; align-items: center;
}
#cm-overlay.open { display: flex; }
#cm-modal {
  background: #12121f; border: 1px solid #2a2a3f;
  border-radius: 20px; padding: 28px; width: 90%; max-width: 520px;
  max-height: 85vh; overflow-y: auto; color: #eee;
  font-family: 'Inter', sans-serif;
  box-shadow: 0 20px 60px rgba(0,0,0,.8);
}
#cm-modal h2 {
  margin: 0 0 20px; font-size: 18px; text-transform: uppercase;
  letter-spacing: 3px;
  background: linear-gradient(135deg,#d4ff00,#00ff66);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.cm-section-title {
  font-size: 11px; font-weight: 700; letter-spacing: 2px;
  color: #888; text-transform: uppercase; margin-bottom: 10px;
}
.cm-input {
  width: 100%; box-sizing: border-box;
  background: #1a1a2e; border: 1px solid #333; border-radius: 8px;
  color: #eee; padding: 10px 14px; font-size: 14px; margin-bottom: 10px;
  font-family: 'Inter', sans-serif;
}
.cm-input:focus { outline: none; border-color: #d4ff00; }
.cm-btn {
  width: 100%; padding: 12px; border-radius: 10px; border: none;
  background: linear-gradient(135deg,#d4ff00,#00ff66);
  color: #000; font-weight: 700; font-size: 14px; cursor: pointer;
  font-family: 'Inter', sans-serif; margin-top: 4px;
  transition: opacity .15s;
}
.cm-btn:disabled { opacity: .5; cursor: not-allowed; }
#cm-logo-preview {
  width: 64px; height: 64px; object-fit: contain;
  background: #1a1a2e; border-radius: 10px; margin-bottom: 10px;
  display: none; border: 1px solid #333;
}
.cm-clubs-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px; margin-bottom: 20px;
}
.cm-club-card {
  background: #1a1a2e; border: 1px solid #2a2a3f; border-radius: 12px;
  padding: 12px; display: flex; flex-direction: column; align-items: center;
  gap: 6px; font-size: 12px; text-align: center; position: relative;
}
.cm-club-card img {
  width: 48px; height: 48px; object-fit: contain;
}
.cm-club-name { font-weight: 600; color: #ccc; word-break: break-word; }
.cm-del-btn {
  position: absolute; top: 6px; right: 6px;
  background: rgba(255,60,0,.2); border: none; border-radius: 6px;
  color: #ff6633; font-size: 11px; cursor: pointer; padding: 2px 5px;
}
.cm-close-btn {
  float: right; background: none; border: none; color: #888;
  font-size: 20px; cursor: pointer; margin-top: -4px;
}
.cm-status {
  font-size: 12px; color: #00ff66; margin-top: 8px;
  min-height: 18px; text-align: center;
}
.cm-divider { border: none; border-top: 1px solid #2a2a3f; margin: 18px 0; }
</style>

<button id="cm-fab">🏟️ Gestisci Club</button>

<div id="cm-overlay">
  <div id="cm-modal">
    <button class="cm-close-btn" id="cm-close">✕</button>
    <h2>🏟️ Gestisci Club</h2>

    <div class="cm-section-title">Club registrati su Firebase</div>
    <div class="cm-clubs-grid" id="cm-clubs-list">
      <div style="color:#555;font-size:13px;grid-column:1/-1">Caricamento…</div>
    </div>

    <hr class="cm-divider" />

    <div class="cm-section-title">Aggiungi nuovo club</div>
    <input class="cm-input" id="cm-name-input" placeholder="Nome club (es. Arsenal)" />
    <input class="cm-input" id="cm-logo-input" placeholder="URL logo immagine" />
    <img id="cm-logo-preview" alt="preview" />
    <button class="cm-btn" id="cm-save-btn">💾 Salva su Firebase</button>
    <div class="cm-status" id="cm-status"></div>
  </div>
</div>

<script type="module">
import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, serverTimestamp }
  from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAWMmt7lrRF1V6AIpQWh2CwXZE88_w_8E0",
  authDomain: "ficup-c9186.firebaseapp.com",
  projectId: "ficup-c9186",
  appId: "1:825031993621:web:f9b49d210864a8c26f611c"
};

// Use a named instance to avoid collision with any app in the main bundle
const existingApp = getApps().find(a => a.name === "club-manager");
const app = existingApp || initializeApp(firebaseConfig, "club-manager");
const db  = getFirestore(app);

const ITALY_URL = "https://i.ibb.co/ksNmFLfF/Logo-Italy-National-Football-Team-2023-svg-1.png";

// ── State ────────────────────────────────────────────
let customClubs  = {};   // { name: logoUrl }
let currentTeamTo = "";  // tracked destination team

// ── DOM refs ─────────────────────────────────────────
const overlay   = document.getElementById("cm-overlay");
const fab       = document.getElementById("cm-fab");
const closeBtn  = document.getElementById("cm-close");
const clubsList = document.getElementById("cm-clubs-list");
const nameInput = document.getElementById("cm-name-input");
const logoInput = document.getElementById("cm-logo-input");
const preview   = document.getElementById("cm-logo-preview");
const saveBtn   = document.getElementById("cm-save-btn");
const statusEl  = document.getElementById("cm-status");

// ── Firebase listener ─────────────────────────────────
const clubsCol = collection(db, "apps/fanta-virtual-v1/clubs");
onSnapshot(clubsCol, snap => {
  customClubs = {};
  snap.forEach(d => { customClubs[d.id] = d.data().logoUrl; });
  renderList();
  injectDropdowns();
});

// ── Render club list inside modal ─────────────────────
function renderList() {
  const names = Object.keys(customClubs);
  if (names.length === 0) {
    clubsList.innerHTML = '<div style="color:#555;font-size:13px;grid-column:1/-1">Nessun club registrato.</div>';
    return;
  }
  clubsList.innerHTML = names.map(n => `
    <div class="cm-club-card">
      <button class="cm-del-btn" data-name="${n}">✕</button>
      <img src="${customClubs[n]}" alt="${n}"
           onerror="this.src='https://via.placeholder.com/48/1a1a2e/888?text=?'" />
      <div class="cm-club-name">${n}</div>
    </div>`).join("");

  clubsList.querySelectorAll(".cm-del-btn").forEach(btn => {
    btn.addEventListener("click", async () => {
      const name = btn.dataset.name;
      if (!confirm(`Eliminare "${name}" da Firebase?`)) return;
      await deleteDoc(doc(db, "apps/fanta-virtual-v1/clubs", name));
    });
  });
}

// ── Inject custom clubs into React destination dropdown ─
let _injecting = false;
function injectDropdowns() {
  if (_injecting) return;
  _injecting = true;
  try {
    document.querySelectorAll("select.ctrl-select").forEach(sel => {
      const hasTeams = Array.from(sel.options).some(o =>
        o.value === "Inter" || o.value === "Milan" || o.value === "Juventus");
      if (!hasTeams) return;

      const customNames  = Object.keys(customClubs);
      const existingCust = Array.from(sel.options)
        .filter(o => o.dataset.custom).map(o => o.value);

      // Already in sync? Skip to avoid triggering MutationObserver loop
      const synced = customNames.length === existingCust.length &&
        customNames.every(n => existingCust.includes(n));
      if (synced) return;

      // Disconnect observer while we touch the DOM
      domObs.disconnect();

      // Remove stale custom options
      Array.from(sel.options).forEach(o => { if (o.dataset.custom) o.remove(); });

      // Add fresh custom options
      customNames.forEach(name => {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = "⭐ " + name;
        opt.dataset.custom = "1";
        sel.appendChild(opt);
      });

      // Re-connect observer
      domObs.observe(document.body, { childList: true, subtree: true });
    });
  } finally {
    _injecting = false;
  }
}

// ── Override logo in card when custom club selected ───
function applyCustomLogo() {
  const sel = document.querySelector("select.ctrl-select[data-teams]") ||
    Array.from(document.querySelectorAll("select.ctrl-select"))
      .find(s => Array.from(s.options).some(o => o.value === "Inter"));
  if (!sel) return;

  const teamTo = sel.value;
  currentTeamTo = teamTo;
  const customLogo = customClubs[teamTo];
  if (!customLogo) return;

  // Find Italy-fallback imgs in the card (React puts Italy URL when club not in qe)
  const card = document.querySelector(".card-inner");
  if (!card) return;
  card.querySelectorAll("img").forEach(img => {
    if (img.src.includes("ksNmFLfF") || img.src === ITALY_URL) {
      img.src = customLogo;
      img.dataset.cmCustom = teamTo;
    }
  });
}

// ── MutationObserver: re-inject after React re-renders ─
let injectTimer = null;
// domObs is declared here so injectDropdowns() can disconnect/reconnect it
const domObs = new MutationObserver((mutations) => {
  // Ignore mutations that are only <option> additions (our own injections)
  const onlyOptions = mutations.every(m =>
    [...m.addedNodes, ...m.removedNodes].every(n => n.nodeName === "OPTION")
  );
  if (onlyOptions) return;

  clearTimeout(injectTimer);
  injectTimer = setTimeout(() => {
    injectDropdowns();
    applyCustomLogo();
  }, 150);
});
domObs.observe(document.body, { childList: true, subtree: true });

// ── Preview logo URL ──────────────────────────────────
logoInput.addEventListener("input", () => {
  const url = logoInput.value.trim();
  preview.style.display = url ? "block" : "none";
  preview.src = url;
});

// ── Save club to Firebase ─────────────────────────────
saveBtn.addEventListener("click", async () => {
  const name = nameInput.value.trim();
  const logoUrl = logoInput.value.trim();
  if (!name) { setStatus("❌ Inserisci il nome del club.", true); return; }
  if (!logoUrl) { setStatus("❌ Inserisci l'URL del logo.", true); return; }

  saveBtn.disabled = true;
  setStatus("Salvataggio…");
  try {
    await setDoc(doc(db, "apps/fanta-virtual-v1/clubs", name), {
      name, logoUrl, createdAt: serverTimestamp()
    });
    nameInput.value = "";
    logoInput.value = "";
    preview.style.display = "none";
    setStatus("✅ Club salvato con successo!");
  } catch (e) {
    setStatus("❌ Errore: " + e.message, true);
  } finally {
    saveBtn.disabled = false;
  }
});

function setStatus(msg, isErr = false) {
  statusEl.textContent = msg;
  statusEl.style.color = isErr ? "#ff6633" : "#00ff66";
  if (!isErr) setTimeout(() => { statusEl.textContent = ""; }, 3000);
}

// ── Panel toggle ──────────────────────────────────────
fab.addEventListener("click", () => overlay.classList.toggle("open"));
closeBtn.addEventListener("click", () => overlay.classList.remove("open"));
overlay.addEventListener("click", e => { if (e.target === overlay) overlay.classList.remove("open"); });

// Slider sensitivity fix: handled by custom +/− controls below (see installCustomSliders)
</script>


<!-- ══════════════════════════════════════════
     SLIDER REPLACEMENT — custom +/− controls
     (fixes sensitivity + "all move together")
     ══════════════════════════════════════════ -->
<style>
/* Hide original range while keeping it in DOM for React */
.ctrl-range { position:absolute !important; opacity:0 !important;
              width:1px !important; height:1px !important;
              pointer-events:none !important; }
/* Custom control wrapper */
.cs-wrap {
  display:flex; align-items:center; gap:4px; padding:2px 0;
  width:100%; box-sizing:border-box; overflow:hidden; min-width:0;
}
.cs-btn {
  width:26px; height:26px; border-radius:6px;
  border:1px solid #3a3a5f; background:#1a1a2e;
  color:#d4ff00; font-size:18px; font-weight:700; line-height:1;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  padding:0; user-select:none; -webkit-user-select:none;
  transition:background .1s, transform .1s; flex-shrink:0;
}
.cs-btn:active, .cs-btn.cs-held { background:#252545; transform:scale(.92); }
.cs-track {
  flex:1; height:6px; background:#1a1a2e; border-radius:3px;
  border:1px solid #3a3a5f; position:relative; cursor:pointer;
  min-width:0; overflow:hidden;
}
.cs-fill {
  height:100%; border-radius:3px;
  background:linear-gradient(90deg,#005ae6,#d4ff00);
  transition:width .12s;
}
.cs-val {
  width:36px; min-width:0; text-align:right; font-size:11px; color:#aaa;
  font-family:'Inter',sans-serif; font-weight:600; flex-shrink:0;
}
</style>

<script>
(function () {
  'use strict';

  function getVal(input) { return parseInt(input.value) || 0; }
  function fmt(v) { return v > 0 ? '+' + v : String(v); }

  function setVal(input, v, min, max) {
    var step = 5;
    v = Math.round(v / step) * step;
    v = Math.max(min, Math.min(max, v));
    var setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
    setter.call(input, String(v));
    var ev = new Event('input', { bubbles: true });
    input.dispatchEvent(ev);
  }

  function buildControl(input) {
    if (input.dataset.cs) return;
    input.dataset.cs = '1';

    var min = parseInt(input.min);
    var max = parseInt(input.max);
    if (isNaN(min)) min = -300;
    if (isNaN(max)) max = 300;
    var range = max - min;

    var wrap = document.createElement('div');
    wrap.className = 'cs-wrap';
    wrap.innerHTML =
      '<button class="cs-btn" data-dir="-1">&#8722;</button>' +
      '<div class="cs-track" data-track><div class="cs-fill"></div></div>' +
      '<button class="cs-btn" data-dir="1">+</button>' +
      '<span class="cs-val"></span>';

    var display = wrap.querySelector('.cs-val');
    var fillEl  = wrap.querySelector('.cs-fill');
    var trackEl = wrap.querySelector('[data-track]');

    function refresh() {
      var v = getVal(input);
      display.textContent = fmt(v);
      var pct = range > 0 ? ((v - min) / range) * 100 : 50;
      fillEl.style.width = Math.max(0, Math.min(100, pct)) + '%';
    }

    // Click on track to jump to that position
    trackEl.addEventListener('click', function (e) {
      var rect = trackEl.getBoundingClientRect();
      var pct  = (e.clientX - rect.left) / rect.width;
      setVal(input, min + pct * range, min, max);
      refresh();
    });

    // +/− buttons with hold-to-repeat
    wrap.querySelectorAll('.cs-btn').forEach(function (btn) {
      var dir = parseInt(btn.dataset.dir);
      var holdId = null;

      function step() { setVal(input, getVal(input) + dir * 5, min, max); refresh(); }

      btn.addEventListener('click', step);

      btn.addEventListener('pointerdown', function () {
        btn.classList.add('cs-held');
        holdId = setInterval(step, 110);
      });
      btn.addEventListener('pointerup', function () {
        btn.classList.remove('cs-held');
        clearInterval(holdId);
      });
      btn.addEventListener('pointercancel', function () {
        btn.classList.remove('cs-held');
        clearInterval(holdId);
      });
      btn.addEventListener('pointerout', function () {
        btn.classList.remove('cs-held');
        clearInterval(holdId);
      });
    });

    input.after(wrap);
    refresh();

    // Keep display in sync when React resets value (e.g. "Reset tutto" button)
    var lastSeen = getVal(input);
    setInterval(function () {
      var v = getVal(input);
      if (v !== lastSeen) { lastSeen = v; refresh(); }
    }, 200);
  }

  function installAll() {
    document.querySelectorAll('.ctrl-range:not([data-cs])').forEach(buildControl);
  }

  // Run once after React mounts (retry a few times to be safe)
  var attempts = 0;
  var boot = setInterval(function () {
    installAll();
    attempts++;
    if (attempts >= 10) clearInterval(boot);
  }, 400);

  // Also catch any new sliders added after initial render
  var obs = new MutationObserver(function () { installAll(); });
  obs.observe(document.body, { childList: true, subtree: true });
})();
</script>

</body>
